# Tender RF — локальный запуск PostgreSQL для разработки
#
# Запуск: docker compose up -d
# Остановка: docker compose down
#
# После запуска backend подключается к postgresql://postgres:postgres@localhost:5432/tender_rf

services:
  postgres:
    image: postgres:16-alpine
    container_name: tender-rf-postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: tender_rf
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
